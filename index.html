<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.2em;
      margin-bottom: 12px;
      color: #4ecca3;
    }

    #score-board {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
    }

    #score-board span { color: #4ecca3; font-weight: bold; }

    canvas {
      border: 2px solid #4ecca3;
      display: block;
    }

    #message {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #aaa;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="score-board">
    Score: <span id="score">0</span>
    &nbsp;&nbsp;Best: <span id="best">0</span>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <p id="message">Press any arrow key to start</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const msgEl = document.getElementById('message');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    const DIR = { UP: [0,-1], DOWN: [0,1], LEFT: [-1,0], RIGHT: [1,0] };

    let snake, dir, next, food, score, best, running, loop;

    best = 0;

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = DIR.RIGHT;
      next = dir;
      score = 0;
      running = false;
      scoreEl.textContent = 0;
      placeFood();
      draw();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function step() {
      dir = next;
      const head = { x: snake[0].x + dir[0], y: snake[0].y + dir[1] };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = '#0f0f1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#1e1e3a';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * GRID + GRID/2 - 1, y * GRID + GRID/2 - 1, 2, 2);
        }
      }

      // Food
      ctx.fillStyle = '#ff6b6b';
      ctx.shadowColor = '#ff6b6b';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        ctx.fillStyle = i === 0 ? '#4ecca3' : `hsl(${160 - t * 40}, 60%, ${50 - t * 15}%)`;
        ctx.shadowColor = i === 0 ? '#4ecca3' : 'transparent';
        ctx.shadowBlur = i === 0 ? 8 : 0;
        const pad = i === 0 ? 1 : 2;
        ctx.fillRect(seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad * 2, GRID - pad * 2);
      });
      ctx.shadowBlur = 0;
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      msgEl.textContent = `Game over! Score: ${score} — Press any arrow key to restart`;

      // Flash effect
      ctx.fillStyle = 'rgba(255, 107, 107, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function start() {
      if (running) return;
      init();
      running = true;
      msgEl.textContent = '';
      loop = setInterval(step, 120);
    }

    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    e.preventDefault(); if (dir !== DIR.DOWN)  next = DIR.UP;    break;
        case 'ArrowDown':  e.preventDefault(); if (dir !== DIR.UP)    next = DIR.DOWN;  break;
        case 'ArrowLeft':  e.preventDefault(); if (dir !== DIR.RIGHT) next = DIR.LEFT;  break;
        case 'ArrowRight': e.preventDefault(); if (dir !== DIR.LEFT)  next = DIR.RIGHT; break;
        default: return;
      }
      if (!running) start();
    });

    init();
  </script>
</body>
</html>
